			html, body { width: 100%; height: 100%; background: #0a0a0b; overflow: hidden; }
			main {
				position: relative;
				width: 100%;

			}

			}
			#corner-tl, #corner-tr, #corner-bl, #corner-br {

				[["POINT CLOUD"],300,710,13,COL.sand,5,COL.fs,0.7],
				[["PROTOTYPE-FREE"],155,700,13,COL.sand,5,COL.fs,0.7],
				[["PARAMETRIC","RATIONALIZATION"],590,890,12,COL.sand,4,COL.fs,0.7],
			]

			const EDGES = [
				[0,1,COL.teal,0.35],[0,2,COL.teal,0.22],[0,3,COL.teal,0.22],
				[0,17,COL.petrol,0.30],[0,35,COL.violet,0.32],[0,52,COL.sand,0.30],[0,53,COL.sand,0.20],
				[1,2,COL.teal,0.25],[1,9,COL.teal,0.22],[1,10,COL.teal,0.22],[1,3,COL.teal,0.20],
				[2,6,COL.teal,0.20],[2,10,COL.teal,0.18],[3,4,COL.teal,0.20],[3,5,COL.teal,0.18],
				[4,5,COL.teal,0.15],[2,4,COL.teal,0.18],[6,7,COL.teal,0.18],[7,8,COL.teal,0.14],
				[6,16,COL.teal,0.15],[9,12,COL.teal,0.18],[9,13,COL.teal,0.15],[10,11,COL.teal,0.18],
				[10,14,COL.teal,0.15],[11,15,COL.teal,0.14],[12,13,COL.teal,0.14],[11,14,COL.teal,0.14],[15,16,COL.teal,0.13],
				[17,18,COL.petrol,0.25],[17,19,COL.petrol,0.22],[17,20,COL.petrol,0.22],[17,21,COL.petrol,0.20],
				[18,21,COL.petrol,0.20],[18,19,COL.petrol,0.18],[19,22,COL.petrol,0.18],[20,22,COL.petrol,0.18],
				[21,22,COL.petrol,0.16],[22,23,COL.petrol,0.16],[22,31,COL.petrol,0.15],[23,24,COL.petrol,0.14],
				[24,25,COL.petrol,0.14],[25,26,COL.petrol,0.13],[26,31,COL.petrol,0.13],[18,32,COL.petrol,0.16],
				[19,27,COL.petrol,0.15],[32,33,COL.petrol,0.13],[17,34,COL.petrol,0.18],[34,35,COL.petrol,0.12],
				[27,28,COL.petrol,0.13],[28,29,COL.petrol,0.12],[29,30,COL.petrol,0.12],[30,31,COL.petrol,0.12],
				[35,36,COL.violet,0.25],[35,37,COL.violet,0.22],[35,38,COL.violet,0.20],[35,39,COL.violet,0.22],
				[35,40,COL.violet,0.18],[36,37,COL.violet,0.18],[36,41,COL.violet,0.18],[37,38,COL.violet,0.16],
				[38,39,COL.violet,0.16],[39,40,COL.violet,0.16],[40,41,COL.violet,0.15],[41,42,COL.violet,0.14],
				[41,43,COL.violet,0.14],[36,44,COL.violet,0.14],[44,45,COL.violet,0.13],[36,46,COL.violet,0.15],
				[46,47,COL.violet,0.14],[35,47,COL.violet,0.16],[47,48,COL.violet,0.15],[42,43,COL.violet,0.13],
				[37,43,COL.violet,0.13],[44,46,COL.violet,0.12],[43,44,COL.violet,0.12],[48,49,COL.violet,0.12],

				[52,53,COL.sand,0.25],[52,54,COL.sand,0.22],[52,56,COL.sand,0.20],[52,62,COL.sand,0.20],

				[60,64,COL.sand,0.14],[61,70,COL.sand,0.13],[62,63,COL.sand,0.18],[62,64,COL.sand,0.16],
				[63,65,COL.sand,0.14],[64,65,COL.sand,0.14],[65,70,COL.sand,0.13],[66,67,COL.sand,0.13],
				[67,68,COL.sand,0.12],[60,67,COL.sand,0.13],[65,68,COL.sand,0.12],
				[0,17,COL.petrol,0.12],[0,39,COL.violet,0.12],
				[35,17,"#ffffff",0.06],[17,1,"#ffffff",0.06],[1,52,"#ffffff",0.05],
				[35,53,"#ffffff",0.05],[52,3,"#ffffff",0.05],[17,39,"#ffffff",0.04],
			]

			const nodes = RAW.map(([lines,bx,by,r,color,glowR,fill,sw]) => ({
				lines,bx,by,r,color,glowR,fill,sw,x:bx,y:by,vx:0,vy:0,
			}))

			const mouse = { x:-9999, y:-9999 }
			canvas.addEventListener("mousemove", e => {
				const rect = canvas.getBoundingClientRect()
				mouse.x = e.clientX - rect.left
				mouse.y = e.clientY - rect.top
			})
			canvas.addEventListener("mouseleave", () => { mouse.x=-9999; mouse.y=-9999 })

			const REPEL_R=160, REPEL_STR=3200, SPRING_K=0.055, DAMPING=0.80, DT=0.016

			function getTransform() {
				const sc = Math.min(canvas.width/VW, canvas.height/VH) * 1.05
				const ox = (canvas.width  - VW*sc) / 2
				const oy = (canvas.height - VH*sc) / 2
				return {sc,ox,oy}
			}

			function drawGlow(x,y,r,color,gr) {
				const g = ctx.createRadialGradient(x,y,r*0.3,x,y,r+gr)
				g.addColorStop(0,color+"60")
				g.addColorStop(0.5,color+"22")
				g.addColorStop(1,color+"00")
				ctx.beginPath(); ctx.arc(x,y,r+gr,0,Math.PI*2)
				ctx.fillStyle=g; ctx.fill()
			}

			function frame() {
				requestAnimationFrame(frame)
				ctx.fillStyle=COL.bg
				ctx.fillRect(0,0,canvas.width,canvas.height)
				const {sc,ox,oy} = getTransform()

				for (const n of nodes) {
					const cx=n.x*sc+ox, cy=n.y*sc+oy
					const dx=cx-mouse.x, dy=cy-mouse.y
					const dist=Math.sqrt(dx*dx+dy*dy)
					if (dist<REPEL_R && dist>0.5) {
						const f=REPEL_STR/(dist*dist)
						n.vx+=(dx/dist)*f; n.vy+=(dy/dist)*f
					}
					n.vx+=(n.bx-n.x)*SPRING_K; n.vy+=(n.by-n.y)*SPRING_K
					n.vx*=DAMPING; n.vy*=DAMPING
					n.x+=n.vx*DT; n.y+=n.vy*DT
					const maxD=80/sc
					const ddx=n.x-n.bx, ddy=n.y-n.by
					const dd=Math.sqrt(ddx*ddx+ddy*ddy)
					if (dd>maxD){n.x=n.bx+(ddx/dd)*maxD; n.y=n.by+(ddy/dd)*maxD}
				}

				for (const [ia,ib,color,op] of EDGES) {
					const a=nodes[ia],b=nodes[ib]; if(!a||!b) continue
					const ax=a.x*sc+ox,ay=a.y*sc+oy,bx=b.x*sc+ox,by=b.y*sc+oy
					ctx.save(); ctx.globalAlpha=op; ctx.strokeStyle=color
					ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke(); ctx.restore()
				}

				for (const n of nodes) {
					const cx=n.x*sc+ox, cy=n.y*sc+oy, r=n.r*sc, gr=n.glowR*sc
					drawGlow(cx,cy,r,n.color,gr)
					ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=n.fill; ctx.fill()
					ctx.lineWidth=(n.sw||1)*sc*0.7; ctx.strokeStyle=n.color; ctx.stroke()
					const fsize=Math.max(8,Math.min(r*0.30,11))
					ctx.font=`300 ${fsize}px 'JetBrains Mono', monospace`
					ctx.fillStyle=n.color; ctx.textAlign="center"; ctx.textBaseline="middle"
					const lh=fsize*1.3
					const startY=cy-((n.lines.length-1)*lh)/2
					for(let i=0;i<n.lines.length;i++) ctx.fillText(n.lines[i],cx,startY+i*lh)
				}
			}
			frame()
		</script>
